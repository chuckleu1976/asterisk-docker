; sms-gateway dialplan — Phase C rewrite (2026-06-21)
;
; Strategy: dialplan only does what's required to (a) keep the call/SMS
; alive on the IMS side and (b) emit a structured AMI UserEvent that
; sms-gateway translates into ModemEvent.  All persistence, notification,
; transcription, and routing live in sms-gateway, not here.
;
; Conventions
;   UserEvent: SmsReceived  -> From, Body
;   UserEvent: CallStarted  -> Direction (inbound|outbound), Phone, CallId
;   UserEvent: CallAnswered -> CallId
;   UserEvent: CallEnded    -> CallId, RecordingPath
;
; CallId is always ${UNIQUEID} for correlation across UserEvents and
; Hangup/MixMonitorStop AMI events.

[volte_ims]
; Inbound call from the IMS network.
; Auto-answer, record, and let sms-gateway decide what to do via its event
; consumer.  60-second cap is a safety net; sms-gateway can issue
; AMI Hangup earlier.
exten => _.,1,NoOp(Incoming call from ${CALLERID(num)})
same => n,Set(REC_PATH=/logs/recordings/${UNIQUEID}_${CALLERID(num)}.wav)
same => n,UserEvent(CallStarted,Direction: inbound,Phone: ${CALLERID(num)},CallId: ${UNIQUEID})
same => n,Answer()
same => n,MixMonitor(${REC_PATH},b)
same => n,UserEvent(CallAnswered,CallId: ${UNIQUEID})
same => n,Wait(60)
same => n,UserEvent(CallEnded,CallId: ${UNIQUEID},RecordingPath: ${REC_PATH})
same => n,Hangup()

[volte_ims_msg]
; Inbound SMS via SIP MESSAGE on the IMS network.
; Body may be empty for binary SMS (SIM OTA, WAP push) — that is fine,
; sms-gateway filters by Body == "" if it wants.
exten => _.,1,NoOp(Incoming SMS from ${MESSAGE(from)})
same => n,UserEvent(SmsReceived,From: ${MESSAGE(from)},Body: ${MESSAGE(body)})

[from-sip]
; Outbound calls originated by SIP clients (MicroSIP, etc.).  sms-gateway
; itself uses AMI Originate directly and does not hit this context.
exten => _.,1,NoOp(Outbound call to ${EXTEN})
same => n,Set(REC_PATH=/logs/recordings/${UNIQUEID}_${EXTEN}.wav)
same => n,UserEvent(CallStarted,Direction: outbound,Phone: ${EXTEN},CallId: ${UNIQUEID})
same => n,MixMonitor(${REC_PATH},b)
same => n,Dial(PJSIP/${EXTEN}@volte_ims)
same => n,UserEvent(CallEnded,CallId: ${UNIQUEID},RecordingPath: ${REC_PATH})
same => n,Hangup()

[msg-from-sip]
; Outbound SMS from SIP clients.  sms-gateway uses AMI MessageSend
; directly.  Kept here so any non-AMI SIP client (MicroSIP) can still
; reach the IMS network.
exten => _.,1,NoOp(Outbound SMS to ${MESSAGE(to)})
same => n,Set(DEST=${CUT(CUT(MESSAGE(to),@,1),:,2)})
same => n,MessageSend(pjsip:volte_ims/${DEST}@volte_ims,volte_ims,sip:${DEST}@volte_ims)
