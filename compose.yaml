services:
  pcscd:
    build:
      context: ./pcscd
      dockerfile: Dockerfile
    image: ghcr.io/chuckleu1976/pcscd-sysmocom:latest
    restart: always
    privileged: true
    environment:
      - LD_LIBRARY_PATH=/usr/lib64/remsim-libs
      - SIM_MODE=${SIM_MODE:-local}
    volumes:
      - ./pcscd/entrypoint.sh:/entrypoint.sh:ro
      - pcsc-sock:/run/pcscd
      - ./remsim/libs:/usr/lib64/remsim-libs:ro
      - ./remsim/serial:/usr/lib64/pcsc/drivers/serial:ro
      - ./remsim/reader.conf.d:/etc/reader.conf.d:ro
    tmpfs:
      - /run
    devices:
      - /dev/bus/usb:/dev/bus/usb
  asterisk:
    image: ghcr.io/chuckleu1976/asterisk-vowifi-patched:latest
    hostname: asterisk1
    build:
      context: ./asterisk
      dockerfile: Dockerfile
      network: host
    cap_add:
      - CAP_NET_ADMIN
    privileged: true
    devices:
      - /dev/net/tun
      - /dev/bus/usb:/dev/bus/usb
    ports:
      - 5060:5060/udp
      - 10000-10009:10000-10009/udp
      - 127.0.0.1:5038:5038/tcp
    tmpfs:
      - /run
    environment:
      - LD_LIBRARY_PATH=/opt/pcsc-libs
    volumes:
      - ./pcsc-libs:/opt/pcsc-libs:ro
      - ./config/1/epdg.conf:/usr/local/etc/swanctl/conf.d/epdg.conf:Z,ro
      - ./config/1/asterisk:/etc/asterisk:Z
      - ./config/1/ami_usim.ini:/usr/local/etc/ami_usim.ini:Z,ro
      - ./config/1/telegram_token:/usr/local/etc/telegram_token:Z,ro
      - ../logs/1:/logs:Z
      - ./sim_inventory.db:/data/sim_inventory.db:Z
      - pcsc-sock:/run/pcscd
    pid: service:pcscd
    depends_on: [pcscd]
    healthcheck:
      test: ["CMD-SHELL", "swanctl --list-sas 2>/dev/null | grep -q ESTABLISHED || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 120s
    restart: always
