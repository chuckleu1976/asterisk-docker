services:
  pcscd:
    image: phcodercat/pcscd
    restart: always
    volumes:
      - pcsc-sock:/run/pcscd
    tmpfs:
      - /run
    devices:
      - /dev/bus/usb:/dev/bus/usb
  asterisk:
    image: asterisk-vowifi-patched
    build:
      context: ./asterisk
      dockerfile: Dockerfile.patch
    cap_add:
      - CAP_NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - 5060:5060/udp
      - 10000-10019:10000-10019/udp
    tmpfs:
      - /run
    volumes:
      - ./config/1/epdg.conf:/usr/local/etc/swanctl/conf.d/epdg.conf:Z,ro
      - ./config/1/asterisk:/etc/asterisk:Z,ro
      - ./config/1/ami_usim.ini:/usr/local/etc/ami_usim.ini:Z,ro
      - ./config/1/telegram_token:/usr/local/etc/telegram_token:Z,ro
      - ../logs/1:/logs:Z
      - pcsc-sock:/run/pcscd
    pid: service:pcscd
    depends_on: [pcscd]
    restart: always

  asterisk2:
    image: asterisk-vowifi-patched
    build:
      context: ./asterisk
      dockerfile: Dockerfile.patch
    cap_add:
      - CAP_NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - 5061:5060/udp              # Different external port
      - 11001-11020:10000-10019/udp  # Different external RTP range, same internal range
    tmpfs:
      - /run
    volumes:
      - ./config/2/epdg.conf:/usr/local/etc/swanctl/conf.d/epdg.conf:Z,ro
      - ./config/2/asterisk:/etc/asterisk:Z,ro
      - ./config/2/ami_usim.ini:/usr/local/etc/ami_usim.ini:Z,ro
      - ./config/2/telegram_token:/usr/local/etc/telegram_token:Z,ro
      - ../logs/2:/logs:Z
      - pcsc-sock:/run/pcscd
    pid: service:pcscd
    depends_on: [pcscd]
    restart: always

volumes:
  pcsc-sock:
